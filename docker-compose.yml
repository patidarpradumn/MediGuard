services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: healthcare-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - healthcare-network

  # 2. FastAPI Backend Service
  backend:
    build: ./backend
    container_name: healthcare-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/healthcare_db
      - PORT=8000
      - HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SENDER=${SMTP_SENDER}
    depends_on:

      - mongodb
    networks:
      - healthcare-network

  # 3. React Frontend Service
  frontend:
    build:
      context: ./frontend
    container_name: healthcare-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
